name: ai_dungeon_master
description: "AI Dungeon Master - D&D 5e with AI Game Master"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.0.0
  bloc: ^9.0.0

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Routing
  go_router: ^14.8.1

  # Networking
  dio: ^5.7.0
  web_socket_channel: ^3.0.2

  # Voice
  agora_rtc_engine: ^6.3.0

  # Local Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.6

  # Firebase
  firebase_core: ^3.15.2
  firebase_crashlytics: ^4.3.4
  firebase_analytics: ^11.5.1

  # UI
  lottie: ^3.3.1
  shimmer: ^3.0.0
  markdown: ^7.3.0
  flutter_markdown: ^0.7.6

  # Auth
  crypto: ^3.0.6
  sign_in_with_apple: ^6.1.4

  # Utils
  connectivity_plus: ^6.1.4
  equatable: ^2.0.7
  intl: ^0.20.1
  path: ^1.9.0
  path_provider: ^2.1.5
  uuid: ^4.5.1
  sqflite_common: ^2.5.6
  sqflite_common_ffi: ^2.3.4
  permission_handler: ^12.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  injectable_generator: ^2.7.0

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
