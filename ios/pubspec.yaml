name: ai_dungeon_master
description: "AI Dungeon Master - D&D 5e with AI Game Master"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Routing
  go_router: ^15.1.2

  # Networking
  dio: ^5.7.0
  retrofit: ^4.4.1
  web_socket_channel: ^3.0.2

  # Voice
  flutter_tts: ^4.2.0
  speech_to_text: ^7.0.0

  # Local Storage
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  flutter_secure_storage: ^9.2.4

  # Firebase
  firebase_core: ^3.12.1
  firebase_crashlytics: ^4.3.4
  firebase_analytics: ^11.5.1

  # UI
  lottie: ^3.3.1
  shimmer: ^3.0.0

  # Utils
  equatable: ^2.0.7
  connectivity_plus: ^6.1.4
  path_provider: ^2.1.5

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  injectable_generator: ^2.7.0
  retrofit_generator: ^9.1.7
  isar_generator: ^3.1.0+1

  # Testing
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true

  assets:
    - assets/animations/
    - assets/images/
